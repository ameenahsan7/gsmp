<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — GSMP</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="nav-logo">
        <img src="../images/logo.jpeg" alt="GSMP" class="logo-icon">
        <span class="logo-text">GSMP</span>
      </a>
      <h1>Welcome Back</h1>
      <p class="auth-sub">Log in to your GSMP account</p>

      <div id="errorMsg" style="display:none; background:#FEE2E2; color:#991B1B; padding:12px 16px; border-radius:6px; font-size:14px; margin-bottom:16px;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@medschool.edu" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">Log In</button>
      </form>

      <p class="auth-footer">
        Not a member yet? <a href="join.html">Join GSMP</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      submitBtn.textContent = 'Logging in...';
      submitBtn.disabled = true;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorMsg.textContent = err.message || 'Invalid email or password.';
        errorMsg.style.display = 'block';
        submitBtn.textContent = 'Log In';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
