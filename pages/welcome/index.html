<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../../images/favicon-white.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — GSMP</title>
  <link rel="stylesheet" href="../../css/style.css?v=8">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f1923 0%, #1B2A4A 50%, #2a1a30 100%); overflow: hidden; }
    .welcome-container { text-align: center; padding: 40px 24px; max-width: 600px; animation: fadeUp 1s ease-out; }
    .welcome-shield { width: 80px; height: 80px; margin: 0 auto 24px; animation: pulse 2s ease-in-out infinite; }
    .welcome-shield img { width: 100%; height: 100%; object-fit: contain; }
    .welcome-tag { display: inline-block; background: rgba(196, 154, 60, 0.15); color: #C49A3C; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 6px 16px; border-radius: 20px; border: 1px solid rgba(196, 154, 60, 0.3); margin-bottom: 20px; }
    .welcome-title { font-family: 'Playfair Display', serif; font-size: clamp(28px, 6vw, 44px); color: #fff; margin: 0 0 16px; line-height: 1.2; }
    .welcome-name { color: #C49A3C; }
    .welcome-subtitle { font-family: 'Inter', sans-serif; font-size: 16px; color: rgba(255,255,255,0.65); line-height: 1.7; margin: 0 0 32px; max-width: 480px; margin-left: auto; margin-right: auto; }
    .welcome-btn { display: inline-block; padding: 14px 36px; background: #C49A3C; color: #0f1923; font-size: 15px; font-weight: 700; border-radius: 8px; text-decoration: none; transition: all 0.3s; letter-spacing: 0.5px; }
    .welcome-btn:hover { background: #d4aa4c; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(196, 154, 60, 0.3); }
    .welcome-dots { margin-top: 48px; display: flex; justify-content: center; gap: 8px; }
    .welcome-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15); }
    .welcome-dot:nth-child(2) { background: #C49A3C; width: 24px; border-radius: 3px; }
    .confetti { position: fixed; top: -10px; width: 8px; height: 8px; border-radius: 1px; opacity: 0; animation: fall linear forwards; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    @keyframes fall { 0% { opacity: 1; transform: translateY(0) rotate(0deg); } 100% { opacity: 0; transform: translateY(100vh) rotate(720deg); } }
  </style>
</head>
<body>
  <div class="welcome-container">
    <div class="welcome-shield"><img src="../../images/favicon-white.png" alt="GSMP"></div>
    <div class="welcome-tag">New Member</div>
    <h1 class="welcome-title">Welcome to GSMP,<br><span class="welcome-name" id="memberName">Member</span></h1>
    <p class="welcome-subtitle">You're now part of the Galen Society of Medical Professionals — a curated global network committed to excellence, collaboration, and meaningful impact in healthcare.</p>
    <a href="../dashboard" class="welcome-btn">Enter Your Dashboard &rarr;</a>
    <div class="welcome-dots"><div class="welcome-dot"></div><div class="welcome-dot"></div><div class="welcome-dot"></div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../../js/supabase-config.js"></script>
  <script>
    // Confetti burst
    const colors = ['#C49A3C', '#6B213F', '#1B2A4A', '#fff', '#d4aa4c'];
    for (let i = 0; i < 40; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (2 + Math.random() * 3) + 's';
      el.style.animationDelay = Math.random() * 1.5 + 's';
      el.style.width = (4 + Math.random() * 8) + 'px';
      el.style.height = (4 + Math.random() * 8) + 'px';
      document.body.appendChild(el);
    }

    // Load member name
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = '../login'; return; }
      const { data: member } = await sb.from('members').select('first_name').eq('id', session.user.id).single();
      if (member && member.first_name) {
        document.getElementById('memberName').textContent = member.first_name;
      }
    })();
  </script>
</body>
</html>
