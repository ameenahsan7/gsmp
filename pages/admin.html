<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Admin — GSMP</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    .admin-page { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    .admin-header h1 { font-family: 'Playfair Display', serif; color: var(--navy); }
    .admin-tabs { display: flex; gap: 0; border-bottom: 2px solid #e5e7eb; margin-bottom: 24px; }
    .admin-tab { padding: 12px 24px; background: none; border: none; font-size: 15px; font-weight: 600; color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
    .admin-tab.active { color: var(--navy); border-bottom-color: var(--navy); }
    .admin-tab:hover { color: var(--navy); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .admin-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .admin-table th { text-align: left; padding: 10px 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; border-bottom: 2px solid #e5e7eb; }
    .admin-table td { padding: 10px 12px; border-bottom: 1px solid #f3f4f6; font-size: 14px; }
    .admin-table tr:hover { background: #f9fafb; }
    .admin-form { background: #f9fafb; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
    .admin-form h3 { margin-bottom: 16px; font-size: 16px; color: var(--navy); }
    .admin-form .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .admin-form .form-group { margin-bottom: 12px; }
    .admin-form label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #374151; }
    .admin-form input, .admin-form select, .admin-form textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; font-family: 'Inter', sans-serif; }
    .admin-form textarea { resize: vertical; min-height: 60px; }
    .btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
    .btn-add { background: var(--navy); color: #fff; }
    .btn-add:hover { opacity: 0.9; }
    .btn-danger { background: #EF4444; color: #fff; }
    .btn-danger:hover { background: #DC2626; }
    .admin-actions { display: flex; gap: 6px; }
    .admin-msg { padding: 10px 14px; border-radius: 6px; font-size: 14px; margin-bottom: 16px; display: none; }
    .admin-msg.success { display: block; background: #D1FAE5; color: #065F46; }
    .admin-msg.error { display: block; background: #FEE2E2; color: #991B1B; }
    .admin-back { text-decoration: none; color: var(--navy); font-size: 14px; font-weight: 500; }
    .admin-back:hover { text-decoration: underline; }
    .member-chapter-select { padding: 4px 8px; font-size: 13px; border: 1px solid #d1d5db; border-radius: 4px; }
    .loading-text { color: #9ca3af; font-style: italic; padding: 20px 0; }
    .btn-csv { background: #fff; color: var(--navy); border: 1px solid #d1d5db; display: inline-flex; align-items: center; gap: 5px; }
    .btn-csv:hover { background: #f3f4f6; }
    .chapter-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .chapter-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .chapter-card-header h4 { font-size: 16px; color: var(--navy); margin: 0; }
    .chapter-meta { font-size: 13px; color: #6b7280; }
    .chapter-codes { margin-top: 12px; padding-top: 12px; border-top: 1px solid #f3f4f6; }
    .chapter-codes h5 { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .code-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13px; }
    .code-badge { font-family: monospace; font-weight: 700; letter-spacing: 1px; background: #f3f4f6; padding: 4px 10px; border-radius: 4px; color: var(--navy); }
    .code-meta { color: #6b7280; }
    .add-code-inline { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .add-code-inline input { padding: 6px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-family: 'Inter', sans-serif; text-transform: uppercase; width: 140px; }
    .add-code-inline input[type="number"] { width: 70px; }
    .btn-edit { background: #f3f4f6; color: var(--navy); border: 1px solid #d1d5db; }
    .btn-edit:hover { background: #e5e7eb; }
    .edit-inline { background: #fffbeb; border: 1px solid #fbbf24; border-radius: 8px; padding: 16px; margin-top: 12px; }
    .edit-inline .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .edit-inline .form-group { margin-bottom: 10px; }
    .edit-inline label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 3px; }
    .edit-inline input, .edit-inline select, .edit-inline textarea { width: 100%; padding: 7px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; font-family: 'Inter', sans-serif; }
    .edit-inline textarea { resize: vertical; min-height: 50px; }
    .edit-actions { display: flex; gap: 6px; margin-top: 8px; }

    @media (max-width: 768px) {
      .admin-page { padding: 16px 10px; }
      .admin-header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .admin-header h1 { font-size: 22px; }
      .admin-tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      .admin-tabs::-webkit-scrollbar { display: none; }
      .admin-tab { padding: 12px 16px; font-size: 13px; white-space: nowrap; min-height: 44px; }
      .admin-stats-grid {
        grid-template-columns: 1fr 1fr 1fr !important;
        gap: 8px !important;
      }
      .admin-form { padding: 16px; }
      .admin-form .form-row { grid-template-columns: 1fr; }
      .admin-form input, .admin-form select, .admin-form textarea { padding: 10px 12px; font-size: 16px; }
      .admin-table { font-size: 12px; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .admin-table th, .admin-table td { padding: 8px 8px; white-space: nowrap; }
      .member-chapter-select { font-size: 14px; padding: 6px 8px; min-height: 36px; }
      .btn-sm { min-height: 40px; min-width: 40px; padding: 8px 14px; font-size: 13px; }
      .btn-csv { min-height: 40px; padding: 8px 12px; font-size: 12px; }
      .admin-actions { gap: 8px; flex-wrap: wrap; }
      .chapter-card { padding: 14px; }
      .chapter-card-header { flex-direction: column; gap: 8px; }
      .add-code-inline { flex-wrap: wrap; }
      .add-code-inline input { width: 100% !important; font-size: 16px; padding: 10px; }
      .code-row { flex-wrap: wrap; gap: 6px; }
      .edit-inline { padding: 12px; }
      .edit-inline .form-row { grid-template-columns: 1fr; }
      .edit-inline input, .edit-inline select, .edit-inline textarea { padding: 10px; font-size: 16px; }
      .edit-actions { flex-wrap: wrap; }
      .admin-back { font-size: 13px; min-height: 44px; display: inline-flex; align-items: center; }
    }
    @media (max-width: 380px) {
      .admin-page { padding: 12px 8px; }
      .admin-header h1 { font-size: 20px; }
      .admin-tab { padding: 10px 12px; font-size: 12px; }
      .admin-stats-grid { grid-template-columns: 1fr !important; }
      .admin-form { padding: 12px; }
      .chapter-card { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="admin-page">
    <div class="admin-header">
      <div>
        <a href="dashboard.html" class="admin-back">&larr; Back to Dashboard</a>
        <h1>SaaS Admin</h1>
      </div>
      <a href="#" id="logoutBtn" class="btn btn-ghost" style="font-size:14px;">Log Out</a>
    </div>

    <div id="adminMsg" class="admin-msg"></div>

    <!-- ANALYTICS -->
    <div class="admin-stats-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;">
      <div style="background:#f9fafb;border-radius:8px;padding:16px;text-align:center;">
        <div style="font-size:28px;font-weight:700;color:var(--navy);" id="statMembers">-</div>
        <div style="font-size:12px;color:#6b7280;margin-top:2px;">Members</div>
      </div>
      <div style="background:#f9fafb;border-radius:8px;padding:16px;text-align:center;">
        <div style="font-size:28px;font-weight:700;color:var(--navy);" id="statChapters">-</div>
        <div style="font-size:12px;color:#6b7280;margin-top:2px;">Chapters</div>
      </div>
      <div style="background:#f9fafb;border-radius:8px;padding:16px;text-align:center;">
        <div style="font-size:28px;font-weight:700;color:var(--navy);" id="statEvents">-</div>
        <div style="font-size:12px;color:#6b7280;margin-top:2px;">Events</div>
      </div>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="chapters">Chapters</button>
      <button class="admin-tab" data-tab="events">Events</button>
      <button class="admin-tab" data-tab="members">Members</button>
    </div>

    <!-- CHAPTERS TAB -->
    <div class="tab-content active" id="tab-chapters">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
        <button class="btn-sm btn-csv" onclick="exportChaptersCSV()">&#x2B73; Export CSV</button>
      </div>
      <div class="admin-form">
        <h3>Add Chapter</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Chapter Name</label>
            <input type="text" id="chapterName" placeholder="e.g. Johns Hopkins Chapter">
          </div>
          <div class="form-group">
            <label>City</label>
            <input type="text" id="chapterCity" placeholder="e.g. Baltimore">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Country</label>
            <input type="text" id="chapterCountry" placeholder="e.g. USA">
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="chapterStatus">
              <option value="active">Active</option>
              <option value="forming">Forming</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="chapterDesc" placeholder="Brief description of the chapter"></textarea>
        </div>
        <button class="btn-sm btn-add" onclick="addChapter()">Add Chapter</button>
      </div>

      <div id="chapterCards">
        <p class="loading-text">Loading chapters...</p>
      </div>
    </div>

    <!-- EVENTS TAB -->
    <div class="tab-content" id="tab-events">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
        <button class="btn-sm btn-csv" onclick="exportEventsCSV()">&#x2B73; Export CSV</button>
      </div>
      <div class="admin-form">
        <h3 id="eventFormTitle">Add Event</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Event Title</label>
            <input type="text" id="eventTitle" placeholder="e.g. Clinical Research Workshop">
          </div>
          <div class="form-group">
            <label>Event Type</label>
            <select id="eventType">
              <option value="Workshop">Workshop</option>
              <option value="Panel">Panel</option>
              <option value="Social">Social</option>
              <option value="Webinar">Webinar</option>
              <option value="Conference">Conference</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date & Time</label>
            <input type="datetime-local" id="eventDate">
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="eventLocation" placeholder="e.g. Virtual or city name">
          </div>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="eventDesc" placeholder="What is this event about?"></textarea>
        </div>
        <div class="form-group" style="display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="eventPortal" checked>
          <label for="eventPortal" style="margin:0;">Show in member portal</label>
        </div>
        <button class="btn-sm btn-add" id="eventSubmitBtn" onclick="addEvent()">Add Event</button>
      </div>

      <table class="admin-table">
        <thead>
          <tr><th>Title</th><th>Type</th><th>Date</th><th>Location</th><th>Created By</th><th>Portal</th><th></th></tr>
        </thead>
        <tbody id="eventsTable">
          <tr><td colspan="6" class="loading-text">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- MEMBERS TAB -->
    <div class="tab-content" id="tab-members">
      <div style="display:flex;justify-content:flex-end;margin-bottom:8px;">
        <button class="btn-sm btn-csv" onclick="exportMembersCSV()">&#x2B73; Export CSV</button>
      </div>
      <table class="admin-table">
        <thead>
          <tr><th>Name</th><th>Email</th><th>Institution</th><th>Chapter</th><th>Title</th><th>Referred By</th><th></th></tr>
        </thead>
        <tbody id="membersTable">
          <tr><td colspan="6" class="loading-text">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
  <script>
    const ADMIN_EMAILS = ['ameenahsan7@gmail.com', 'ameen.ahsan@propertyfinder.ae'];

    // Breakglass: ?bg=YOUR_PASSPHRASE bypasses email check
    // Hash of the passphrase stored here so it's not plaintext in source
    const BG_HASH = '09593112ce6122a0c7ebc7de7b87f1ad0f63b7b826c85b3ea7ad4b304a541f66';
    async function checkBreakglass() {
      const bg = new URLSearchParams(window.location.search).get('bg');
      if (!bg) return false;
      const encoded = new TextEncoder().encode(bg);
      const hashBuffer = await crypto.subtle.digest('SHA-256', encoded);
      const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
      return hashHex === BG_HASH;
    }

    let chapters = [];
    let allCodes = [];
    let editingEventId = null;
    let currentUserEmail = '';

    // Tab switching
    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });

    function showMsg(text, type) {
      const msg = document.getElementById('adminMsg');
      msg.textContent = text;
      msg.className = 'admin-msg ' + type;
      setTimeout(() => { msg.className = 'admin-msg'; }, 4000);
    }

    // ========== CHAPTERS (with inline codes) ==========
    async function loadChapters() {
      const [chapRes, codeRes] = await Promise.all([
        sb.from('chapters').select('*').order('name'),
        sb.from('referral_codes').select('*').order('code')
      ]);
      if (chapRes.error) { showMsg('Error loading chapters: ' + chapRes.error.message, 'error'); return; }
      chapters = chapRes.data || [];
      allCodes = codeRes.data || [];

      const container = document.getElementById('chapterCards');
      if (!chapters.length) {
        container.innerHTML = '<p style="color:#9ca3af;">No chapters yet. Add one above.</p>';
        return;
      }

      container.innerHTML = chapters.map(ch => {
        const chapterCodes = allCodes.filter(c => c.chapter_id === ch.id);
        const codesHTML = chapterCodes.length
          ? chapterCodes.map(c => `
              <div class="code-row">
                <span class="code-badge">${c.code}</span>
                <span class="code-meta">Used: ${c.times_used || 0}${c.max_uses ? '/' + c.max_uses : ''}</span>
                <span class="code-meta">${c.note || ''}</span>
                ${c.created_by ? '<span class="code-meta" style="font-size:11px;opacity:0.7;">by ' + c.created_by.split('@')[0] + '</span>' : ''}
                <span style="margin-left:auto;display:flex;gap:4px;align-items:center;">
                  <input type="checkbox" ${c.active ? 'checked' : ''} onchange="toggleCode('${c.id}', this.checked)" title="Active">
                  <button class="btn-sm btn-danger" style="padding:3px 8px;font-size:11px;" onclick="deleteCode('${c.id}')">×</button>
                </span>
              </div>
            `).join('')
          : '<p style="color:#9ca3af;font-size:13px;margin:0;">No codes yet for this chapter.</p>';

        return `
          <div class="chapter-card">
            <div class="chapter-card-header">
              <div>
                <h4>${ch.name}</h4>
                <div class="chapter-meta">${ch.city || ''}${ch.city && ch.country ? ', ' : ''}${ch.country || ''} · ${ch.status || 'active'}</div>
                ${ch.description ? '<div class="chapter-meta" style="margin-top:4px;">' + ch.description + '</div>' : ''}
                ${ch.created_by ? '<div class="chapter-meta" style="margin-top:4px;font-size:11px;opacity:0.7;">Created by: ' + ch.created_by + '</div>' : ''}
              </div>
              <div class="admin-actions">
                <button class="btn-sm btn-edit" onclick="toggleEditChapter('${ch.id}')">Edit</button>
                <button class="btn-sm btn-danger" onclick="deleteChapter('${ch.id}')">Delete</button>
              </div>
            </div>
            <div id="editCh-${ch.id}" style="display:none;" class="edit-inline">
              <div class="form-row">
                <div class="form-group"><label>Chapter Name</label><input type="text" id="editChName-${ch.id}" value="${ch.name || ''}"></div>
                <div class="form-group"><label>City</label><input type="text" id="editChCity-${ch.id}" value="${ch.city || ''}"></div>
              </div>
              <div class="form-row">
                <div class="form-group"><label>Country</label><input type="text" id="editChCountry-${ch.id}" value="${ch.country || ''}"></div>
                <div class="form-group"><label>Status</label>
                  <select id="editChStatus-${ch.id}">
                    <option value="active" ${ch.status === 'active' ? 'selected' : ''}>Active</option>
                    <option value="forming" ${ch.status === 'forming' ? 'selected' : ''}>Forming</option>
                  </select>
                </div>
              </div>
              <div class="form-group"><label>Description</label><textarea id="editChDesc-${ch.id}">${ch.description || ''}</textarea></div>
              <div class="edit-actions">
                <button class="btn-sm btn-add" onclick="saveChapterEdit('${ch.id}')">Save</button>
                <button class="btn-sm btn-edit" onclick="toggleEditChapter('${ch.id}')">Cancel</button>
              </div>
            </div>
            <div class="chapter-codes">
              <h5>Referral Codes</h5>
              ${codesHTML}
              <div class="add-code-inline">
                <input type="text" id="newCode-${ch.id}" placeholder="CODE" maxlength="20">
                <input type="number" id="newCodeMax-${ch.id}" placeholder="Max" min="0" value="0" title="Max uses (0 = unlimited)">
                <input type="text" id="newCodeNote-${ch.id}" placeholder="Note" style="width:160px;">
                <button class="btn-sm btn-add" onclick="addCodeToChapter('${ch.id}')">+ Add</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function addChapter() {
      const name = document.getElementById('chapterName').value.trim();
      const city = document.getElementById('chapterCity').value.trim();
      const country = document.getElementById('chapterCountry').value.trim();
      const status = document.getElementById('chapterStatus').value;
      const description = document.getElementById('chapterDesc').value.trim();
      if (!name) { showMsg('Chapter name is required.', 'error'); return; }

      const { error } = await sb.from('chapters').insert({ name, city, country, status, description, created_by: currentUserEmail });
      if (error) { showMsg('Error: ' + error.message, 'error'); return; }
      showMsg('Chapter added!', 'success');
      document.getElementById('chapterName').value = '';
      document.getElementById('chapterCity').value = '';
      document.getElementById('chapterCountry').value = '';
      document.getElementById('chapterDesc').value = '';
      loadChapters();
      loadAnalytics();
    }

    async function deleteChapter(id) {
      if (!confirm('Delete this chapter and all its referral codes?')) return;
      // Delete codes for this chapter first
      await sb.from('referral_codes').delete().eq('chapter_id', id);
      const { error } = await sb.from('chapters').delete().eq('id', id);
      if (error) { showMsg('Error: ' + error.message, 'error'); return; }
      showMsg('Chapter deleted.', 'success');
      loadChapters();
      loadAnalytics();
    }

    function toggleEditChapter(id) {
      const form = document.getElementById('editCh-' + id);
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    async function saveChapterEdit(id) {
      const name = document.getElementById('editChName-' + id).value.trim();
      const city = document.getElementById('editChCity-' + id).value.trim();
      const country = document.getElementById('editChCountry-' + id).value.trim();
      const status = document.getElementById('editChStatus-' + id).value;
      const description = document.getElementById('editChDesc-' + id).value.trim();
      if (!name) { showMsg('Chapter name is required.', 'error'); return; }

      const { error } = await sb.from('chapters').update({ name, city, country, status, description }).eq('id', id);
      if (error) { showMsg('Error: ' + error.message, 'error'); return; }
      showMsg('Chapter updated!', 'success');
      loadChapters();
    }

    // ========== CODES (inline in chapters) ==========
    async function addCodeToChapter(chapterId) {
      const code = document.getElementById('newCode-' + chapterId).value.trim().toUpperCase();
      const max_uses = parseInt(document.getElementById('newCodeMax-' + chapterId).value) || 0;
      const note = document.getElementById('newCodeNote-' + chapterId).value.trim();
      if (!code) { showMsg('Code is required.', 'error'); return; }

      const { error } = await sb.from('referral_codes').insert({ code, max_uses, note, chapter_id: chapterId, active: true, times_used: 0, created_by: currentUserEmail });
      if (error) { showMsg('Error: ' + error.message, 'error'); return; }
      showMsg('Code added!', 'success');
      loadChapters();
    }

    async function toggleCode(id, active) {
      const { error } = await sb.from('referral_codes').update({ active }).eq('id', id);
      if (error) { showMsg('Error: ' + error.message, 'error'); return; }
      showMsg(active ? 'Code activated.' : 'Code deactivated.', 'success');
    }

    async function deleteCode(id) {
      if (!confirm('Delete this code?')) return;
      const { error } = await sb.from('referral_codes').delete().eq('id', id);
      if (error) { showMsg('Error: ' + error.message, 'error'); return; }
      showMsg('Code deleted.', 'success');
      loadChapters();
    }

    // ========== EVENTS ==========
    function editEvent(id, title, type, date, loc, desc, portal) {
      editingEventId = id;
      document.getElementById('eventTitle').value = title;
      document.getElementById('eventType').value = type;
      document.getElementById('eventDate').value = date ? date.slice(0, 16) : '';
      document.getElementById('eventLocation').value = loc;
      document.getElementById('eventDesc').value = desc;
      document.getElementById('eventPortal').checked = portal;
      document.getElementById('eventFormTitle').textContent = 'Edit Event';
      document.getElementById('eventSubmitBtn').textContent = 'Update Event';
      if (!document.getElementById('eventCancelBtn')) {
        document.getElementById('eventSubmitBtn').insertAdjacentHTML('afterend',
          ' <button class="btn-sm btn-edit" id="eventCancelBtn" onclick="cancelEventEdit()">Cancel</button>');
      }
    }

    function cancelEventEdit() {
      editingEventId = null;
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventDate').value = '';
      document.getElementById('eventLocation').value = '';
      document.getElementById('eventDesc').value = '';
      document.getElementById('eventFormTitle').textContent = 'Add Event';
      document.getElementById('eventSubmitBtn').textContent = 'Add Event';
      const cancelBtn = document.getElementById('eventCancelBtn');
      if (cancelBtn) cancelBtn.remove();
    }

    async function loadEvents() {
      const { data, error } = await sb.from('events').select('*').order('event_date', { ascending: true });
      if (error) { showMsg('Error loading events: ' + error.message, 'error'); return; }
      const tbody = document.getElementById('eventsTable');
      if (!data || !data.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="color:#9ca3af;">No events yet.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(ev => {
        const d = ev.event_date ? new Date(ev.event_date).toLocaleDateString('en', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' }) : '—';
        const portalChecked = ev.show_in_portal !== false ? 'checked' : '';
        const creator = ev.created_by ? ev.created_by.split('@')[0] : '—';
        return `
          <tr>
            <td><strong>${ev.title}</strong></td>
            <td>${ev.event_type || '—'}</td>
            <td>${d}</td>
            <td>${ev.location || '—'}</td>
            <td style="font-size:12px;color:#6b7280;">${creator}</td>
            <td><input type="checkbox" ${portalChecked} onchange="togglePortal('${ev.id}', this.checked)" title="Show in member portal"></td>
            <td class="admin-actions">
              <button class="btn-sm btn-edit" onclick="editEvent('${ev.id}','${ev.title.replace(/'/g,"\\'")}','${ev.event_type || ''}','${ev.event_date || ''}','${(ev.location||'').replace(/'/g,"\\'")}','${(ev.description||'').replace(/'/g,"\\'")}',${ev.show_in_portal !== false})">Edit</button>
              <button class="btn-sm btn-danger" onclick="deleteEvent('${ev.id}')">Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function addEvent() {
      const title = document.getElementById('eventTitle').value.trim();
      const event_type = document.getElementById('eventType').value;
      const event_date = document.getElementById('eventDate').value;
      const location = document.getElementById('eventLocation').value.trim();
      const description = document.getElementById('eventDesc').value.trim();
      if (!title || !event_date) { showMsg('Title and date are required.', 'error'); return; }

      const show_in_portal = document.getElementById('eventPortal').checked;

      if (editingEventId) {
        const { error } = await sb.from('events').update({ title, event_type, event_date, location, description, show_in_portal }).eq('id', editingEventId);
        if (error) { showMsg('Error: ' + error.message, 'error'); return; }
        showMsg('Event updated!', 'success');
        cancelEventEdit();
      } else {
        const { error } = await sb.from('events').insert({ title, event_type, event_date, location, description, show_in_portal, created_by: currentUserEmail });
        if (error) { showMsg('Error: ' + error.message, 'error'); return; }
        showMsg('Event added!', 'success');
        document.getElementById('eventTitle').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('eventLocation').value = '';
        document.getElementById('eventDesc').value = '';
      }
      loadEvents();
      loadAnalytics();
    }

    async function togglePortal(id, checked) {
      const { error } = await sb.from('events').update({ show_in_portal: checked }).eq('id', id);
      if (error) { showMsg('Error: ' + error.message, 'error'); return; }
      showMsg(checked ? 'Event visible in portal.' : 'Event hidden from portal.', 'success');
    }

    async function deleteEvent(id) {
      if (!confirm('Delete this event?')) return;
      const { error } = await sb.from('events').delete().eq('id', id);
      if (error) { showMsg('Error: ' + error.message, 'error'); return; }
      showMsg('Event deleted.', 'success');
      loadEvents();
      loadAnalytics();
    }

    // ========== MEMBERS ==========
    async function loadMembers() {
      const { data, error } = await sb.from('members').select('*').order('first_name');
      if (error) { showMsg('Error loading members: ' + error.message, 'error'); return; }
      const tbody = document.getElementById('membersTable');
      if (!data || !data.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="color:#9ca3af;">No members yet.</td></tr>';
        return;
      }
      const TITLE_OPTIONS = ['Member','Active Member','Senior Member','Ambassador','Chapter Lead','Fellow'];
      tbody.innerHTML = data.map(m => {
        const selectedChapter = m.chapter_id || '';
        const currentTitle = m.member_title || 'Member';
        return `
        <tr>
          <td><strong>${m.first_name || ''} ${m.last_name || ''}</strong></td>
          <td>${m.email || '—'}</td>
          <td>${m.school || '—'}</td>
          <td>
            <select class="member-chapter-select" onchange="assignChapter('${m.id}', this.value)">
              <option value="">— None —</option>
              ${chapters.map(ch => `<option value="${ch.id}" ${ch.id === selectedChapter ? 'selected' : ''}>${ch.name}</option>`).join('')}
            </select>
          </td>
          <td>
            <select class="member-chapter-select" onchange="assignTitle('${m.id}', this.value)">
              ${TITLE_OPTIONS.map(t => `<option value="${t}" ${t === currentTitle ? 'selected' : ''}>${t}</option>`).join('')}
            </select>
          </td>
          <td><span style="font-family:monospace;font-size:12px;">${m.referred_by || '—'}</span></td>
          <td class="admin-actions">
            <button class="btn-sm btn-danger" onclick="deleteMember('${m.id}')">Remove</button>
          </td>
        </tr>
      `}).join('');
    }

    async function assignChapter(memberId, chapterId) {
      const value = chapterId || null;
      const { error } = await sb.from('members').update({ chapter_id: value }).eq('id', memberId);
      if (error) { showMsg('Error assigning chapter: ' + error.message, 'error'); return; }
      showMsg('Chapter assigned!', 'success');
    }

    async function assignTitle(memberId, title) {
      const { error } = await sb.from('members').update({ member_title: title }).eq('id', memberId);
      if (error) { showMsg('Error assigning title: ' + error.message, 'error'); return; }
      showMsg('Title updated to ' + title + '!', 'success');
    }

    async function deleteMember(id) {
      if (!confirm('Remove this member? This only removes their profile, not their auth account.')) return;
      const { error } = await sb.from('members').delete().eq('id', id);
      if (error) { showMsg('Error: ' + error.message, 'error'); return; }
      showMsg('Member removed.', 'success');
      loadMembers();
    }

    // ========== CSV EXPORT ==========
    function downloadCSV(rows, filename) {
      const csv = rows.map(r => r.map(c => '"' + String(c ?? '').replace(/"/g, '""') + '"').join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    async function exportChaptersCSV() {
      if (!chapters.length) { showMsg('No chapters to export.', 'error'); return; }
      const rows = [['Chapter Name', 'City', 'Country', 'Status', 'Description', 'Referral Codes']];
      chapters.forEach(ch => {
        const chCodes = allCodes.filter(c => c.chapter_id === ch.id).map(c => c.code).join('; ');
        rows.push([ch.name, ch.city || '', ch.country || '', ch.status || '', ch.description || '', chCodes]);
      });
      downloadCSV(rows, 'gsmp_chapters.csv');
      showMsg('Chapters exported!', 'success');
    }

    async function exportEventsCSV() {
      const { data } = await sb.from('events').select('*').order('event_date', { ascending: true });
      if (!data || !data.length) { showMsg('No events to export.', 'error'); return; }
      const rows = [['Title', 'Type', 'Date', 'Location', 'Description', 'Portal']];
      data.forEach(ev => rows.push([
        ev.title, ev.event_type || '', ev.event_date || '', ev.location || '',
        ev.description || '', ev.show_in_portal !== false ? 'Yes' : 'No'
      ]));
      downloadCSV(rows, 'gsmp_events.csv');
      showMsg('Events exported!', 'success');
    }

    async function exportMembersCSV() {
      const { data } = await sb.from('members').select('*').order('first_name');
      if (!data || !data.length) { showMsg('No members to export.', 'error'); return; }
      const rows = [['Name', 'Email', 'Institution', 'Chapter', 'Title', 'Referred By', 'Joined']];
      data.forEach(m => {
        const ch = chapters.find(c => c.id === m.chapter_id);
        rows.push([
          (m.first_name || '') + ' ' + (m.last_name || ''),
          m.email || '', m.school || '', ch ? ch.name : '', m.member_title || 'Member',
          m.referred_by || '', m.created_at ? new Date(m.created_at).toLocaleDateString() : ''
        ]);
      });
      downloadCSV(rows, 'gsmp_all_members.csv');
      showMsg('Members exported!', 'success');
    }

    // ========== ANALYTICS ==========
    async function loadAnalytics() {
      const [members, chaps, evts] = await Promise.all([
        sb.from('members').select('id', { count: 'exact', head: true }),
        sb.from('chapters').select('id', { count: 'exact', head: true }),
        sb.from('events').select('id', { count: 'exact', head: true }),
      ]);
      document.getElementById('statMembers').textContent = members.count || 0;
      document.getElementById('statChapters').textContent = chaps.count || 0;
      document.getElementById('statEvents').textContent = evts.count || 0;
    }

    // ========== INIT ==========
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }

      currentUserEmail = session.user.email;
      const isBreakglass = await checkBreakglass();
      if (!ADMIN_EMAILS.includes(session.user.email) && !isBreakglass) {
        document.querySelector('.admin-page').innerHTML = '<div style="text-align:center;padding:80px 20px;"><h2 style="color:#991B1B;">Access Denied</h2><p>You do not have admin privileges.</p><a href="dashboard.html">Back to Dashboard</a></div>';
        return;
      }

      await loadChapters();
      loadEvents();
      loadMembers();
      loadAnalytics();

      document.getElementById('logoutBtn').addEventListener('click', async (e) => {
        e.preventDefault();
        await sb.auth.signOut();
        window.location.href = 'login.html';
      });
    })();
  </script>
</body>
</html>
